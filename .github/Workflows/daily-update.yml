name: ViaLog — Atualização Diária

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  atualizar-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install anthropic requests

      - name: Gerar newsletter com Claude AI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commitar e publicar atualização
        run: |
          git config user.name "ViaLog Bot"
          git config user.email "vialog@mrs.com.br"
          git add index.html
          git diff --staged --quiet || git commit -m "🚂 ViaLog — $(date +'%d/%m/%Y') — atualização automática"
          git push
